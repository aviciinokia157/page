name: reserva_de_convidados
description: Aplicativo premium de reservas de mesas para Android, iOS e Web.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2
  provider: ^6.1.2
  intl: ^0.19.0
  fl_chart: ^0.69.0
  qr_flutter: ^4.1.0
  pdf: ^3.11.1
  excel: ^4.0.6
  file_saver: ^0.2.14

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
